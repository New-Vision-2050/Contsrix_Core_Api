version: '3'

server:
  command: "php artisan octane:start --server=roadrunner --host=0.0.0.0 --port=8000"
  relay: pipes

rpc:
  listen: tcp://127.0.0.1:6001

http:
  address: 0.0.0.0:8000
  middleware:
    - gzip
    - static
  static:
    dir: public
    forbid:
      - .php
      - .htaccess
  pool:
    num_workers: 4
    max_jobs: 500
    allocate_timeout: 60s
    destroy_timeout: 60s
  headers:
    response:
      X-Powered-By: "Octane"

logs:
  mode: production
  level: error
  output: stderr
