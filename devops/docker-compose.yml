services:
    backend:
        build:
            context: ..
            dockerfile: devops/Dockerfile
        image: backend-${DEPLOYMENT_ID}
        restart: always
        deploy:
            replicas: ${REPLICAS:-1}
            restart_policy:
                condition: on-failure
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.backend-${DEPLOYMENT_ID}.rule=Host(`core-be-${DEPLOYMENT_ID}.constrix-nv.com`)"
            - "traefik.http.routers.backend-${DEPLOYMENT_ID}.entrypoints=https"
            - "traefik.http.routers.backend-${DEPLOYMENT_ID}.tls.certresolver=letsencrypt"
            - "traefik.http.routers.backend-${DEPLOYMENT_ID}.tls=true"
            - "traefik.http.routers.backend-${DEPLOYMENT_ID}.middlewares=large-upload@docker"
            - "traefik.http.middlewares.large-upload.buffering.maxRequestBodyBytes=1000000000"
            #      - "traefik.http.routers.nextjs-${DEPLOYMENT_ID}.middlewares=security-headers,rate-limit"
            - "traefik.http.services.backend-${DEPLOYMENT_ID}.loadbalancer.server.port=80"
        networks:
            - traefik_network

networks:
    traefik_network:
        external: true

