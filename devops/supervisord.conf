[program:laravel-scheduler]
command=bash -c "while true; do php /var/www/artisan schedule:run && sleep 60; done"
directory=/var/www
autostart=true
autorestart=true
startretries=3
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/laravel-scheduler.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3

# Ensure the log files are writable by www-data
[program:setup-permissions]
command=bash -c "touch /var/log/laravel-worker.log /var/log/laravel-scheduler.log /var/log/supervisord.log && chmod 664 /var/log/laravel-worker.log /var/log/laravel-scheduler.log /var/log/supervisord.log && chown www-data:www-data /var/log/laravel-worker.log /var/log/laravel-scheduler.log"
autostart=true
autorestart=false
startsecs=0
priority=1
