openapi: 3.0.3
info:
  title: Attendance Constraints - Branch Locations API
  description: |
    API specification for branch locations functionality in the Employee Attendance Management System.
    
    This API allows managing custom location data per branch for attendance constraints, enabling:
    - Multi-branch organizations with different location requirements
    - GPS-based geofencing with configurable radius per location
    - Flexible location management (add, update, remove branch locations)
    - Validation of location data (coordinates, radius, address)
    
    ## Key Features
    - **Custom Location Data**: Each branch can have unique location settings
    - **Geofencing Support**: GPS coordinates with configurable radius (1-10000 meters)
    - **Validation**: Comprehensive validation for coordinates, radius, and required fields
    - **Flexibility**: Support for different location types (office, restaurant, warehouse, etc.)
    
    ## Use Cases
    - Restaurant chains with different location requirements
    - Security companies with precise site boundaries  
    - Office buildings with flexible work arrangements
    - Healthcare facilities with campus-wide coverage
    - Educational institutions with large campus areas
  version: 1.0.0
  contact:
    name: API Support
    email: api-support@company.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000/api
    description: Development server
  - url: https://api.company.com/api
    description: Production server

security:
  - bearerAuth: []

paths:
  /attendance/constraints:
    post:
      tags:
        - Attendance Constraints
      summary: Create attendance constraint with branch locations
      description: |
        Creates a new attendance constraint with custom location data for different branches.
        Each branch can have unique location settings including GPS coordinates and radius.
      operationId: createConstraintWithBranchLocations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttendanceConstraintRequest'
            examples:
              restaurant_chain:
                summary: Restaurant Chain Example
                description: Restaurant chain with different location requirements
                value:
                  constraint_type: "location_geofence"
                  name: "Restaurant Chain Location Constraint"
                  description: "Location tracking for restaurant chain with different requirements per location"
                  config:
                    enforcement_level: "strict"
                    allow_manual_override: false
                    notification_enabled: true
                    grace_period_minutes: 5
                  branch_locations:
                    restaurant-downtown:
                      name: "Downtown Restaurant"
                      address: "100 Main Street, Downtown District"
                      latitude: 40.7589
                      longitude: -73.9851
                      radius: 25
                    restaurant-mall:
                      name: "Shopping Mall Location"
                      address: "500 Mall Plaza, Shopping Center"
                      latitude: 40.7505
                      longitude: -73.9934
                      radius: 50
                  is_active: true
                  priority: 1
                  start_date: "2024-01-01"
              security_company:
                summary: Security Company Example
                description: Security company with precise site boundaries
                value:
                  constraint_type: "location_geofence"
                  name: "Security Company Site Locations"
                  description: "Precise location tracking for security personnel at different client sites"
                  config:
                    enforcement_level: "maximum"
                    allow_manual_override: false
                    real_time_tracking: true
                  branch_locations:
                    security-bank:
                      name: "First National Bank"
                      address: "200 Financial District, Bank Plaza"
                      latitude: 40.7074
                      longitude: -74.0113
                      radius: 10
                    security-warehouse:
                      name: "Industrial Warehouse Complex"
                      address: "1500 Industrial Blvd, Warehouse District"
                      latitude: 40.6643
                      longitude: -73.9385
                      radius: 200
                  is_active: true
                  priority: 3
              office_building:
                summary: Office Building Example
                description: Office building with flexible work arrangements
                value:
                  constraint_type: "location_geofence"
                  name: "Corporate Office Locations"
                  description: "Flexible location tracking for office workers"
                  config:
                    enforcement_level: "moderate"
                    allow_manual_override: true
                    notification_enabled: true
                  branch_locations:
                    office-headquarters:
                      name: "Headquarters Building"
                      address: "123 Business Ave, Corporate District"
                      latitude: 40.7128
                      longitude: -74.0060
                      radius: 100
                    office-coworking:
                      name: "Co-working Space"
                      address: "456 Innovation Hub, Tech District"
                      latitude: 40.7831
                      longitude: -73.9712
                      radius: 150
                  is_active: true
                  priority: 2
      responses:
        '201':
          description: Constraint created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceConstraintResponse'
              examples:
                success_response:
                  summary: Successful creation
                  value:
                    success: true
                    message: "Attendance constraint created successfully"
                    data:
                      id: "constraint-uuid-123"
                      constraint_type: "location_geofence"
                      name: "Restaurant Chain Location Constraint"
                      description: "Location tracking for restaurant chain"
                      config:
                        enforcement_level: "strict"
                        allow_manual_override: false
                        notification_enabled: true
                      branch_locations:
                        restaurant-downtown:
                          name: "Downtown Restaurant"
                          address: "100 Main Street, Downtown District"
                          latitude: 40.7589
                          longitude: -73.9851
                          radius: 25
                        restaurant-mall:
                          name: "Shopping Mall Location"
                          address: "500 Mall Plaza, Shopping Center"
                          latitude: 40.7505
                          longitude: -73.9934
                          radius: 50
                      is_active: true
                      priority: 1
                      created_at: "2024-01-01T10:00:00Z"
                      updated_at: "2024-01-01T10:00:00Z"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                validation_error:
                  summary: Validation errors
                  value:
                    success: false
                    message: "Validation failed"
                    errors:
                      "branch_locations.branch-1.name": ["The name field is required"]
                      "branch_locations.branch-1.latitude": ["The latitude must be between -90 and 90"]
                      "branch_locations.branch-1.radius": ["The radius must be between 1 and 10000"]
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    get:
      tags:
        - Attendance Constraints
      summary: List attendance constraints with branch locations
      description: |
        Retrieves a list of attendance constraints with optional branch location data.
        Use the include_branch_locations parameter to include location data in the response.
      operationId: listConstraintsWithBranchLocations
      parameters:
        - name: include_branch_locations
          in: query
          description: Include branch location data in the response
          required: false
          schema:
            type: boolean
            default: false
        - name: constraint_type
          in: query
          description: Filter by constraint type
          required: false
          schema:
            type: string
            enum: [location_geofence, time_window, device_restriction]
        - name: is_active
          in: query
          description: Filter by active status
          required: false
          schema:
            type: boolean
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
      responses:
        '200':
          description: List of constraints retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceConstraintListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /attendance/constraints/{id}:
    get:
      tags:
        - Attendance Constraints
      summary: Get attendance constraint with branch locations
      description: |
        Retrieves a specific attendance constraint including its branch location data.
      operationId: getConstraintWithBranchLocations
      parameters:
        - name: id
          in: path
          description: Constraint ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Constraint retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceConstraintResponse'
        '404':
          description: Constraint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    put:
      tags:
        - Attendance Constraints
      summary: Update attendance constraint branch locations
      description: |
        Updates an attendance constraint's branch locations. This replaces all existing branch locations
        with the provided data. Use PATCH for partial updates.
      operationId: updateConstraintBranchLocations
      parameters:
        - name: id
          in: path
          description: Constraint ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttendanceConstraintRequest'
            examples:
              update_locations:
                summary: Update branch locations
                value:
                  branch_locations:
                    branch-hq-updated:
                      name: "Updated Headquarters"
                      address: "123 New Business Ave, Downtown"
                      latitude: 40.7128
                      longitude: -74.0060
                      radius: 60
                    branch-new:
                      name: "New Branch Location"
                      address: "789 Expansion Road, Growth District"
                      latitude: 40.7400
                      longitude: -74.0200
                      radius: 80
                  notes: "Updated branch locations with new branch"
              clear_locations:
                summary: Clear all branch locations
                value:
                  branch_locations: {}
                  notes: "Removed all branch-specific locations"
      responses:
        '200':
          description: Constraint updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceConstraintResponse'
        '404':
          description: Constraint not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    patch:
      tags:
        - Attendance Constraints
      summary: Partially update constraint branch locations
      description: |
        Partially updates an attendance constraint's branch locations. This merges the provided
        branch locations with existing ones. To remove a branch location, omit it from the request.
      operationId: partialUpdateConstraintBranchLocations
      parameters:
        - name: id
          in: path
          description: Constraint ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartialUpdateAttendanceConstraintRequest'
            examples:
              add_branch:
                summary: Add new branch location
                value:
                  branch_locations:
                    branch-expansion:
                      name: "Expansion Branch"
                      address: "999 Growth Street, New District"
                      latitude: 40.7500
                      longitude: -74.0300
                      radius: 75
              update_radius:
                summary: Update existing branch radius
                value:
                  branch_locations:
                    branch-hq:
                      radius: 100
      responses:
        '200':
          description: Constraint updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceConstraintResponse'
        '404':
          description: Constraint not found
        '422':
          description: Validation error
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    delete:
      tags:
        - Attendance Constraints
      summary: Delete attendance constraint
      description: |
        Deletes an attendance constraint and all its associated branch location data.
      operationId: deleteConstraintWithBranchLocations
      parameters:
        - name: id
          in: path
          description: Constraint ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Constraint deleted successfully
        '404':
          description: Constraint not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BranchLocation:
      type: object
      required:
        - name
        - latitude
        - longitude
        - radius
      properties:
        name:
          type: string
          description: Human-readable name for the location
          minLength: 1
          maxLength: 255
          example: "Downtown Office"
        address:
          type: string
          description: Physical address of the location
          maxLength: 500
          example: "123 Business Ave, Downtown, NY 10001"
        latitude:
          type: number
          format: float
          minimum: -90
          maximum: 90
          description: GPS latitude coordinate
          example: 40.7128
        longitude:
          type: number
          format: float
          minimum: -180
          maximum: 180
          description: GPS longitude coordinate
          example: -74.0060
        radius:
          type: integer
          minimum: 1
          maximum: 10000
          description: Geofence radius in meters
          example: 50

    BranchLocations:
      type: object
      description: |
        Object containing branch locations keyed by branch UUID.
        Each key is a branch identifier and the value is a BranchLocation object.
      additionalProperties:
        $ref: '#/components/schemas/BranchLocation'
      example:
        branch-hq-uuid:
          name: "Headquarters Office"
          address: "123 Business District, Downtown"
          latitude: 40.7128
          longitude: -74.0060
          radius: 50
        branch-west-uuid:
          name: "West Side Branch"
          address: "456 West Avenue, Westside"
          latitude: 40.7831
          longitude: -73.9712
          radius: 75

    CreateAttendanceConstraintRequest:
      type: object
      required:
        - constraint_type
        - name
        - config
        - is_active
      properties:
        constraint_type:
          type: string
          enum: [location_geofence, time_window, device_restriction, role_based, behavioral, security, compliance]
          description: Type of attendance constraint
          example: "location_geofence"
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Name of the constraint
          example: "Multi-Branch Location Constraint"
        description:
          type: string
          maxLength: 1000
          description: Description of the constraint
          example: "Location-based attendance constraint with different settings per branch"
        config:
          type: object
          description: Constraint-specific configuration
          example:
            enforcement_level: "strict"
            allow_manual_override: false
            notification_enabled: true
        branch_locations:
          $ref: '#/components/schemas/BranchLocations'
        is_active:
          type: boolean
          description: Whether the constraint is active
          example: true
        priority:
          type: integer
          minimum: 1
          maximum: 10
          description: Constraint priority (1 = highest)
          example: 1
        start_date:
          type: string
          format: date
          description: Date when constraint becomes effective
          example: "2024-01-01"
        end_date:
          type: string
          format: date
          description: Date when constraint expires
          example: "2024-12-31"
        notes:
          type: string
          maxLength: 1000
          description: Additional notes about the constraint
          example: "Multi-branch location constraint with different radius settings per location"

    UpdateAttendanceConstraintRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Name of the constraint
        description:
          type: string
          maxLength: 1000
          description: Description of the constraint
        config:
          type: object
          description: Constraint-specific configuration
        branch_locations:
          $ref: '#/components/schemas/BranchLocations'
        is_active:
          type: boolean
          description: Whether the constraint is active
        priority:
          type: integer
          minimum: 1
          maximum: 10
          description: Constraint priority
        start_date:
          type: string
          format: date
          description: Date when constraint becomes effective
        end_date:
          type: string
          format: date
          description: Date when constraint expires
        notes:
          type: string
          maxLength: 1000
          description: Additional notes about the constraint

    PartialUpdateAttendanceConstraintRequest:
      type: object
      description: |
        Partial update request that merges provided fields with existing data.
        For branch_locations, provided locations are merged with existing ones.
      properties:
        branch_locations:
          type: object
          description: |
            Branch locations to add or update. Existing locations not included here remain unchanged.
            To remove a location, use the full PUT request with the complete desired set.
          additionalProperties:
            $ref: '#/components/schemas/BranchLocation'
        notes:
          type: string
          maxLength: 1000
          description: Additional notes about the constraint

    AttendanceConstraint:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique constraint identifier
          example: "constraint-uuid-123"
        constraint_type:
          type: string
          description: Type of attendance constraint
          example: "location_geofence"
        name:
          type: string
          description: Name of the constraint
          example: "Multi-Branch Location Constraint"
        description:
          type: string
          description: Description of the constraint
          example: "Location-based attendance constraint with different settings per branch"
        config:
          type: object
          description: Constraint-specific configuration
          example:
            enforcement_level: "strict"
            allow_manual_override: false
        branch_locations:
          $ref: '#/components/schemas/BranchLocations'
        is_active:
          type: boolean
          description: Whether the constraint is active
          example: true
        priority:
          type: integer
          description: Constraint priority
          example: 1
        start_date:
          type: string
          format: date
          description: Date when constraint becomes effective
          example: "2024-01-01"
        end_date:
          type: string
          format: date
          nullable: true
          description: Date when constraint expires
          example: null
        notes:
          type: string
          description: Additional notes
          example: "Multi-branch location constraint"
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2024-01-01T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2024-01-01T10:00:00Z"

    AttendanceConstraintResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Attendance constraint retrieved successfully"
        data:
          $ref: '#/components/schemas/AttendanceConstraint'

    AttendanceConstraintListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Attendance constraints retrieved successfully"
        data:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceConstraint'
        meta:
          type: object
          properties:
            current_page:
              type: integer
              example: 1
            per_page:
              type: integer
              example: 15
            total:
              type: integer
              example: 50
            last_page:
              type: integer
              example: 4

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Validation failed"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            "branch_locations.branch-1.name": ["The name field is required"]
            "branch_locations.branch-1.latitude": ["The latitude must be between -90 and 90"]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Resource not found"
        error:
          type: string
          example: "The requested constraint could not be found"

  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Unauthenticated"
            error: "Authentication token is required"

    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Forbidden"
            error: "You do not have permission to perform this action"

tags:
  - name: Attendance Constraints
    description: |
      Operations for managing attendance constraints with branch-specific location data.
      
      This API enables organizations to:
      - Create location-based constraints with different settings per branch
      - Manage GPS coordinates and geofencing radius for each location
      - Update and maintain branch location data
      - Validate location data for accuracy and compliance
      
      Perfect for multi-branch organizations requiring flexible location management.
