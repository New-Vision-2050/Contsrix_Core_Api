name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - dev
      - staging
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Deployment ID
        id: set_deployment_id
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "DEPLOYMENT_ID=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            BRANCH_NAME="${{ github.ref_name }}"
            echo "DEPLOYMENT_ID=${BRANCH_NAME}" >> $GITHUB_ENV
          fi

      - name: Echo Deployment ID
        run: |
          echo "Deployment ID: $DEPLOYMENT_ID"

      - name: Transfer Docker Image to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "."
          target: "/home/deployer/laravel/deployments/${{ env.DEPLOYMENT_ID }}/code/"

      - name: Set Environment Variables Based on Branch
        id: set_env
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" ]]; then
            echo "APP_ENV=production" >> $GITHUB_ENV
            echo "APP_DEBUG=false" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "APP_ENV=development" >> $GITHUB_ENV
            echo "APP_DEBUG=true" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "APP_ENV=staging" >> $GITHUB_ENV
            echo "APP_DEBUG=true" >> $GITHUB_ENV
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "APP_ENV=pr" >> $GITHUB_ENV
            echo "APP_DEBUG=true" >> $GITHUB_ENV
          else
            echo "APP_ENV=development" >> $GITHUB_ENV
            echo "APP_DEBUG=true" >> $GITHUB_ENV
          fi

      - name: Echo Environment Variables
        run: |
          echo "APP_ENV: $APP_ENV"
          echo "APP_DEBUG: $APP_DEBUG"

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        env:
          APP_ENV: ${{ env.APP_ENV }}
          APP_DEBUG: ${{ env.APP_DEBUG }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          APP_KEY: ${{ secrets.APP_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            #!/bin/bash
            set -e
            set -x
            
            # Assign variables
            DEPLOYMENT_ID=${{ env.DEPLOYMENT_ID }}
            IMAGE_TAR=backend-${DEPLOYMENT_ID}.tar
            CONTAINER_NAME=backend-${DEPLOYMENT_ID}
            DEPLOY_DIR=/home/deployer/laravel/deployments/$DEPLOYMENT_ID/code
            
            echo "Deployment ID: $DEPLOYMENT_ID"
            echo "Container Name: $CONTAINER_NAME"
            echo "Deployment Directory: $DEPLOY_DIR"
            echo "DB_HOST: $DB_HOST"
            echo "DB_HOST: ${DB_HOST}"
            echo "DB_HOST: ${{env.DB_HOST}}"
            
            # Navigate to deployment directory
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR
                      
            # Create .env file
            cat <<EOF > .env
            APP_ENV=${{env.APP_ENV}}
            APP_DEBUG=${{env.APP_DEBUG}}
            
            DB_HOST=${{env.DB_HOST}}
            DB_PORT=${{env.DB_PORT}}
            DB_USER=${{env.DB_USER}}
            DB_PASSWORD=${{env.DB_PASSWORD}}
            DB_NAME=${{env.DB_NAME}}-${DEPLOYMENT_ID}
            REDIS_HOST=redis
            
            APP_KEY=${{env.APP_KEY}}
            JWT_SECRET=${{env.JWT_SECRET}}
            EOF
            
            # Secure the .env file
            chmod 600 .env
            
            docker build -f devops/Dockerfile -t ${CONTAINER_NAME} . --progress=plain
                                    
            # Stop and remove existing container if it exists
            if [ "$(docker ps -a --filter name=^/${CONTAINER_NAME}$ --format '{{.Names}}')" == "$CONTAINER_NAME" ]; then
              echo "Stopping and removing existing container: $CONTAINER_NAME"
              docker stop $CONTAINER_NAME
              docker rm $CONTAINER_NAME
            else
              echo "No existing container named $CONTAINER_NAME found."
            fi
            
            # Run the new container with .env file
            echo "Running new container: $CONTAINER_NAME"
            docker run -d \
              --name $CONTAINER_NAME \
              --network traefik_network \
              --env-file .env \
              --restart unless-stopped \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.backend-${DEPLOYMENT_ID}.rule=Host(\`core-be-${DEPLOYMENT_ID}.constrix-nv.com\`)" \
              --label "traefik.http.routers.backend-${DEPLOYMENT_ID}.entrypoints=https" \
              --label "traefik.http.routers.backend-${DEPLOYMENT_ID}.tls=true" \
              --label "traefik.http.routers.backend-${DEPLOYMENT_ID}.tls.certresolver=letsencrypt" \
              --label "traefik.http.services.backend-${DEPLOYMENT_ID}.loadbalancer.server.port=80" \
              backend-${DEPLOYMENT_ID}
            
            echo "Deployment of $CONTAINER_NAME completed successfully."

      - name: Post Deployment Comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 **Deployment Successful**
            
            Your backend has been deployed to the following URL:
            
            🔗 [Backend Preview](https://backend-${{ env.DEPLOYMENT_ID }}.constrix-nv.com)

  cleanup:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
    needs: deploy
    steps:
      - name: Set Deployment ID for Cleanup
        id: set_cleanup_deployment_id
        run: |
          echo "DEPLOYMENT_ID=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Echo Deployment ID for Cleanup
        run: |
          echo "Cleanup Deployment ID: $DEPLOYMENT_ID"

      - name: Cleanup Deployment on Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            set -x

            # Assign variables
            DEPLOYMENT_ID=${DEPLOYMENT_ID}
            CONTAINER_NAME=backend-${DEPLOYMENT_ID}
            DEPLOY_DIR=/home/deployer/laravel/deployments/$DEPLOYMENT_ID

            echo "Starting cleanup for Deployment ID: $DEPLOYMENT_ID"

            # Navigate to deployment directory
            cd $DEPLOY_DIR

            # Stop and remove the container if it exists
            if [ "$(docker ps -a --filter name=^/${CONTAINER_NAME}$ --format '{{.Names}}')" == "$CONTAINER_NAME" ]; then
              echo "Stopping and removing container: $CONTAINER_NAME"
              docker stop $CONTAINER_NAME
              docker rm $CONTAINER_NAME
            else
              echo "No container named $CONTAINER_NAME found."
            fi

            # Remove the Docker image
            IMAGE_TAG=${DEPLOYMENT_ID}
            echo "Removing Docker image: backend:${IMAGE_TAG}"
            docker rmi backend:${IMAGE_TAG} || echo "Image backend:${IMAGE_TAG} not found."

            # Remove the deployment directory
            echo "Removing deployment directory: $DEPLOY_DIR"
            rm -rf $DEPLOY_DIR

            echo "Cleanup for $CONTAINER_NAME completed successfully."
