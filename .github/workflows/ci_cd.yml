name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - production
      - dev
      - stage
#  pull_request:
#    types:
#      - opened
#      - synchronize
#      - reopened
#      - closed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Deployment ID
        id: set_deployment_id
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "DEPLOYMENT_ID=pr${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            BRANCH_NAME="${{ github.ref_name }}"
            echo "DEPLOYMENT_ID=${BRANCH_NAME}" >> $GITHUB_ENV
          fi

      - name: Echo Deployment ID
        run: |
          echo "Deployment ID: $DEPLOYMENT_ID"

      - name: Debug Secrets
        run: |
          echo "DEPLOY_HOST is set: ${{ secrets.DEPLOY_HOST != '' }}"
          echo "DEPLOY_USER is set: ${{ secrets.DEPLOY_USER != '' }}"
          echo "DEPLOY_PORT is set: ${{ secrets.DEPLOY_PORT != '' }}"
          echo "SSH Key is set: ${{ secrets.DEPLOY_SSH_KEY != '' }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: Clean Old Data
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
              DEPLOY_DIR=/home/deployer/laravel/deployments/${{env.DEPLOYMENT_ID}}/code
              rm -rf $DEPLOY_DIR

      - name: Transfer Repo Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "."
          target: "/home/deployer/laravel/deployments/${{ env.DEPLOYMENT_ID }}/code/"

      - name: Set Environment Variables Based on Branch
        id: set_env
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/production" ]]; then
            echo "APP_ENV=production" >> $GITHUB_ENV
            echo "APP_DEBUG=false" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "APP_ENV=development" >> $GITHUB_ENV
            echo "APP_DEBUG=true" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/stage" ]]; then
            echo "APP_ENV=stage" >> $GITHUB_ENV
            echo "APP_DEBUG=true" >> $GITHUB_ENV
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "APP_ENV=pr" >> $GITHUB_ENV
            echo "APP_DEBUG=true" >> $GITHUB_ENV
          else
            echo "APP_ENV=development" >> $GITHUB_ENV
            echo "APP_DEBUG=true" >> $GITHUB_ENV
          fi

      - name: Echo Environment Variables
        run: |
          echo "APP_ENV: $APP_ENV"
          echo "APP_DEBUG: $APP_DEBUG"

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        env:
          APP_ENV: ${{ env.APP_ENV }}
          APP_DEBUG: ${{ env.APP_DEBUG }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USERNAME: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          APP_KEY: ${{ secrets.APP_KEY }}
          AWS_KEY: ${{ secrets.AWS_KEY }}
          AWS_SECRET: ${{ secrets.AWS_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEPLOYMENT_ID: ${{env.DEPLOYMENT_ID}}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION: ${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SMS_MORA_KEY: ${{ secrets.SMS_MORA_KEY }}
          SMS_MORA_SENDER: ${{ secrets.SMS_MORA_SENDER }}
          SMS_MORA_USER: ${{ secrets.SMS_MORA_USER }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          envs: APP_ENV,APP_DEBUG,DB_HOST,DB_PORT,DB_USERNAME,DB_PASSWORD,DB_NAME,APP_KEY,AWS_KEY,AWS_SECRET,JWT_SECRET,DEPLOYMENT_ID,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,MAIL_ENCRYPTION,MAIL_FROM_ADDRESS,GOOGLE_MAPS_API_KEY,SMS_MORA_KEY,SMS_MORA_SENDER,SMS_MORA_USER,OPENROUTER_API_KEY
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 60m
          script: |
            #!/bin/bash
            set -e
            set -x
            export APP_ENV=${{env.APP_ENV}}
            export APP_DEBUG=${{env.APP_DEBUG}}
            export DB_HOST=${{env.DB_HOST}}
            export DB_PORT=${{env.DB_PORT}}
            export DB_USERNAME=${{env.DB_USERNAME}}
            export DB_PASSWORD=${{env.DB_PASSWORD}}
            export DB_NAME=${{env.DB_NAME}}
            export APP_KEY=${{env.APP_KEY}}
            export AWS_KEY=${{env.AWS_KEY}}
            export AWS_SECRET=${{env.AWS_SECRET}}
            export JWT_SECRET=${{env.JWT_SECRET}}
            export DEPLOYMENT_ID=${{env.DEPLOYMENT_ID}}
            export MAIL_HOST=${{env.MAIL_HOST}}
            export MAIL_PORT=${{env.MAIL_PORT}}
            export MAIL_USERNAME=${{env.MAIL_USERNAME}}
            export MAIL_PASSWORD=${{env.MAIL_PASSWORD}}
            export MAIL_ENCRYPTION=${{env.MAIL_ENCRYPTION}}
            export MAIL_FROM_ADDRESS=${{env.MAIL_FROM_ADDRESS}}
            export GOOGLE_MAPS_API_KEY=${{env.GOOGLE_MAPS_API_KEY}}
            export SMS_MORA_KEY=${{env.SMS_MORA_KEY}}
            export SMS_MORA_SENDER=${{env.SMS_MORA_SENDER}}
            export SMS_MORA_USER=${{env.SMS_MORA_USER}}
            export OPENROUTER_API_KEY=${{env.OPENROUTER_API_KEY}}
            DEPLOY_DIR=/home/deployer/laravel/deployments/${{env.DEPLOYMENT_ID}}/code
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR
            echo $DEPLOY_DIR
            chmod +x ./devops/deploy.sh
            ./devops/deploy.sh
            rm -rf $DEPLOY_DIR
            echo "Deployment of $CONTAINER_NAME completed successfully."

      - name: Post Deployment Comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 **Deployment Successful**

            Your backend has been deployed to the following URL:

            🔗 [Backend Preview](https://core-be-${{ env.DEPLOYMENT_ID }}.constrix-nv.com)

  cleanup:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
    needs: deploy
    steps:
      - name: Set Deployment ID for Cleanup
        id: set_cleanup_deployment_id
        run: |
          echo "DEPLOYMENT_ID=pr${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Echo Deployment ID for Cleanup
        run: |
          echo "Cleanup Deployment ID: $DEPLOYMENT_ID"

      - name: Cleanup Deployment on Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            set -x

            # Assign variables
            DEPLOYMENT_ID=${DEPLOYMENT_ID}
            CONTAINER_NAME=backend-${DEPLOYMENT_ID}
            DEPLOY_DIR=/home/deployer/laravel/deployments/$DEPLOYMENT_ID

            echo "Starting cleanup for Deployment ID: $DEPLOYMENT_ID"

            # Navigate to deployment directory
            cd $DEPLOY_DIR

            # Stop and remove the container if it exists
            if [ "$(docker ps -a --filter name=^/${CONTAINER_NAME}$ --format '{{.Names}}')" == "$CONTAINER_NAME" ]; then
              echo "Stopping and removing container: $CONTAINER_NAME"
              docker stop $CONTAINER_NAME
              docker rm $CONTAINER_NAME
            else
              echo "No container named $CONTAINER_NAME found."
            fi

            # Remove the Docker image
            IMAGE_TAG=${DEPLOYMENT_ID}
            echo "Removing Docker image: backend-${IMAGE_TAG}"
            docker rmi backend-${IMAGE_TAG} || echo "Image backend-${IMAGE_TAG} not found."

            # Remove the deployment directory
            echo "Removing deployment directory: $DEPLOY_DIR"
            rm -rf $DEPLOY_DIR

            echo "Cleanup for $CONTAINER_NAME completed successfully."
